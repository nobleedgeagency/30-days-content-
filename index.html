<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>30 Days Content — Enzo Panuela × Noble Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0c0a;--bg2:#131109;
  --card:rgba(255,248,235,.04);--card2:rgba(255,248,235,.07);
  --border:rgba(255,248,235,.09);
  --text:#f5f0e8;--muted:#d4c9b0;--soft:#9c9080;
  --gold:#c9a96e;--gold2:#e8c98a;--goldalpha:rgba(201,169,110,.18);
  --shadow:0 24px 60px rgba(0,0,0,.36);
  --green:#4ade80;
}
*{box-sizing:border-box;max-width:100%}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);overflow-x:hidden;letter-spacing:-.01em;width:100%;}
img,video,iframe,table,pre{max-width:100%}
h1,h2,h3,p{margin:0}
h1{font-size:clamp(34px,6vw,82px);line-height:.92;font-weight:900;letter-spacing:-.05em}
h2{font-size:clamp(24px,3.5vw,52px);line-height:.95;font-weight:900;letter-spacing:-.04em}
p{color:var(--muted);line-height:1.65;font-size:clamp(14px,1.3vw,17px)}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px;width:100%}
.section{padding:72px 0}
#progress-bar{position:fixed;top:0;left:0;z-index:100;height:3px;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .1s linear;}
nav{position:sticky;top:0;z-index:50;background:rgba(14,12,10,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 20px;width:100%;}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.brand{flex-shrink:0;display:inline-flex;align-items:center;border:1px solid rgba(201,169,110,.32);background:rgba(201,169,110,.08);padding:7px 14px;border-radius:999px;color:#e8d9b8;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;transition:background .18s;}
.brand:hover{background:rgba(201,169,110,.18)}
.nav-links{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.nav-links a{font-size:12px;color:var(--soft);padding:6px 11px;border-radius:999px;border:1px solid transparent;font-weight:600;letter-spacing:.04em;transition:all .18s;white-space:nowrap;}
.nav-links a:hover{color:var(--text);border-color:var(--border);background:var(--card)}
.btn-pdf{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;border:1px solid rgba(201,169,110,.35);background:rgba(201,169,110,.1);color:#e8d9b8;font-size:11px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-pdf:hover{background:rgba(201,169,110,.22)}
.lang-toggle{display:inline-flex;border-radius:999px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;}
.lang-btn{padding:7px 14px;font-size:11px;font-weight:800;cursor:pointer;border:none;background:transparent;color:var(--soft);transition:all .18s;letter-spacing:.1em;}
.lang-btn.active{background:var(--gold);color:#0e0c0a;}
.lang-btn:hover:not(.active){background:var(--card);color:var(--text);}
.hero{padding:90px 20px 72px;background:radial-gradient(900px 500px at 90% 10%, rgba(201,169,110,.13), transparent 30%),radial-gradient(700px 380px at 8% 85%, rgba(180,140,80,.10), transparent 28%),linear-gradient(135deg,#0e0c0a 0%,#110e08 42%,#1a1508 100%);width:100%;}
.hero-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;}
.small{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);margin-bottom:12px}
.hero-sub{font-size:clamp(14px,1.5vw,19px);color:var(--muted);margin-top:16px;line-height:1.55}
.hero-cta{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.cta{padding:11px 20px;border-radius:999px;border:1px solid rgba(201,169,110,.35);background:rgba(201,169,110,.12);color:#e8d9b8;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.cta:hover{background:rgba(201,169,110,.24);transform:translateY(-2px)}
.cta.ghost{background:transparent;border-color:var(--border);color:var(--muted)}
.cta.ghost:hover{background:var(--card);color:var(--text)}
.handles{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.handle{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;transition:all .2s;}
.handle:hover{border-color:rgba(201,169,110,.4);background:rgba(201,169,110,.08);color:var(--text);transform:translateY(-2px)}
.handle .platform{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft)}
.cover-box{padding:24px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,248,235,.04),rgba(255,248,235,.01));border-radius:24px;box-shadow:var(--shadow);width:100%;}
.mockfeed{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.tile{aspect-ratio:1/1;border-radius:14px;padding:10px;background:linear-gradient(160deg,#080706,#1a1308 55%,#2e2210);border:1px solid rgba(255,248,235,.07);display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;transition:all .22s;text-decoration:none;}
.tile:hover{border-color:rgba(201,169,110,.5);transform:translateY(-4px);box-shadow:0 12px 32px rgba(201,169,110,.15)}
.tile .t-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft);margin-bottom:4px;}
.tile .t-handle{font-size:clamp(10px,1.1vw,13px);font-weight:800;color:var(--text);line-height:1.15;word-break:break-all;}
.tile .t-handle span{color:var(--gold)}
.tile .t-emoji{font-size:18px;margin-bottom:6px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:40px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;backdrop-filter:blur(10px);transition:all .2s}
.stat:hover{border-color:rgba(201,169,110,.3);transform:translateY(-2px)}
.metric{font-size:clamp(26px,3vw,42px);font-weight:900;color:var(--text);margin-bottom:4px}
.accent{color:var(--gold)}
.mini{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(10px);transition:all .2s}
.card:hover{border-color:rgba(201,169,110,.2);transform:translateY(-2px)}
.card.hi{background:var(--card2)}
.big{padding:28px}
.kicker{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px}
.list{display:grid;gap:9px;margin-top:12px;padding:0}
.list li{padding-left:17px;position:relative;color:var(--muted);line-height:1.5;list-style:none;font-size:clamp(13px,1.2vw,16px)}
.list li::before{content:'';position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--gold)}
.quote{font-size:clamp(18px,2.2vw,27px);line-height:1.2;font-weight:800;color:var(--text)}
.badge{display:inline-block;padding:5px 11px;border-radius:999px;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.24);color:#e8d9b8;font-size:12px;font-weight:700;transition:all .18s}
.badge:hover{background:rgba(201,169,110,.22);transform:scale(1.04)}
.alink{color:var(--gold);font-weight:700;transition:opacity .15s}
.alink:hover{opacity:.7}
.livrable-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.livrable{padding:20px;border-radius:18px;background:var(--card);border:1px solid var(--border);display:flex;flex-direction:column;gap:8px;transition:all .2s}
.livrable:hover{border-color:rgba(201,169,110,.3);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.livrable .l-icon{font-size:28px}
.livrable .l-num{font-size:32px;font-weight:900;color:var(--gold)}
.livrable .l-label{font-size:13px;font-weight:800;color:var(--text)}
.livrable p{font-size:13px;margin:0}
.target-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px}
.target{padding:18px;border-radius:18px;background:linear-gradient(135deg,rgba(201,169,110,.10),rgba(201,169,110,.03));border:1px solid rgba(201,169,110,.2);text-align:center;transition:all .2s}
.target:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(201,169,110,.12)}
.target .t-val{font-size:clamp(22px,2.5vw,36px);font-weight:900;color:var(--text)}
.target .t-val span{color:var(--gold)}
.target .t-desc{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft);margin-top:4px}
.cta-section{padding:80px 20px;background:linear-gradient(135deg,rgba(201,169,110,.10),rgba(201,169,110,.03));border-top:1px solid rgba(201,169,110,.14);border-bottom:1px solid rgba(201,169,110,.14);text-align:center;}
.cta-section h2{margin-bottom:12px}
.cta-section>div>p{max-width:560px;margin:0 auto 32px}
.cta-buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-main{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:999px;background:var(--gold);color:#0e0c0a;font-weight:800;font-size:15px;border:none;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-main:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,169,110,.3)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:999px;background:transparent;color:var(--muted);font-weight:700;font-size:15px;border:1px solid var(--border);cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-secondary:hover{background:var(--card);color:var(--text);border-color:rgba(201,169,110,.3);transform:translateY(-2px)}
.btn-green{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:999px;background:rgba(74,222,128,.12);color:#4ade80;font-weight:700;font-size:15px;border:1px solid rgba(74,222,128,.22);cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-green:hover{background:rgba(74,222,128,.22);transform:translateY(-2px)}
.agency-card{display:flex;align-items:center;gap:24px;padding:28px;border-radius:24px;background:var(--card2);border:1px solid var(--border);flex-wrap:wrap;}
.agency-avatar{width:72px;height:72px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0e0c0a;animation:pulseGlow 3s ease-in-out infinite}
.agency-info{flex:1;min-width:200px}
.agency-info .name{font-size:18px;font-weight:900;color:var(--text);margin-bottom:4px}
.agency-info p{font-size:14px;margin:0}
.sh{margin-bottom:28px}
.sh .label{display:inline-block;margin-bottom:10px}
.tbl-wrap{width:100%;overflow-x:auto;border-radius:20px;border:1px solid var(--border);box-shadow:var(--shadow);-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;background:var(--card);font-size:13px;min-width:480px}
thead td,thead th{background:rgba(255,248,235,.03);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text);font-weight:800;padding:13px 15px;border-bottom:1px solid var(--border);}
tbody td{padding:13px 15px;color:var(--muted);border-bottom:1px solid var(--border);line-height:1.45;vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .18s}
tbody tr:hover td{background:rgba(201,169,110,.04)}
.hooks{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.hook{padding:16px 18px;border-radius:16px;background:rgba(255,248,235,.03);border:1px solid var(--border);font-size:clamp(14px,1.6vw,19px);font-weight:800;line-height:1.18;transition:all .2s}
.hook:hover{border-color:rgba(201,169,110,.3);background:rgba(201,169,110,.05);transform:translateX(4px)}
.roadmap{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.step{padding:18px;border-radius:18px;background:var(--card);border:1px solid var(--border);transition:all .2s}
.step:hover{border-color:rgba(201,169,110,.3);transform:translateY(-3px)}
.step .num{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:5px}
hr.sep{border:none;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.5),transparent);margin:0}
footer{padding:48px 20px 36px;text-align:center;color:var(--soft);font-size:13px;border-top:1px solid var(--border);background:rgba(0,0,0,.25);}
.footer-logo{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.03em;margin-bottom:6px}
.footer-tagline{font-size:13px;color:var(--soft);margin-bottom:20px}
.footer-handles{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:12px 0 20px}
.footer-divider{height:1px;background:var(--border);max-width:400px;margin:16px auto}
.footer-signature{font-size:12px;color:var(--soft);font-style:italic}
/* AVATAR PERSONAS */
.avatar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.avatar-card{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:22px;transition:all .2s}
.avatar-card:hover{border-color:rgba(201,169,110,.3);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.avatar-icon{font-size:36px;margin-bottom:10px}
.avatar-name{font-size:16px;font-weight:900;color:var(--text);margin-bottom:4px}
.avatar-tag{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);margin-bottom:12px}
/* FUNNEL */
.funnel{display:grid;grid-template-columns:repeat(3,1fr);gap:0;position:relative}
.funnel-step{padding:28px 22px;text-align:center;position:relative}
.funnel-step:not(:last-child)::after{content:'→';position:absolute;right:-14px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--gold);z-index:2}
.funnel-step.attract{background:linear-gradient(135deg,rgba(201,169,110,.12),rgba(201,169,110,.04));border:1px solid rgba(201,169,110,.2);border-radius:20px 0 0 20px}
.funnel-step.engage{background:linear-gradient(135deg,rgba(201,169,110,.16),rgba(201,169,110,.06));border:1px solid rgba(201,169,110,.28);border-top:1px solid rgba(201,169,110,.28);border-bottom:1px solid rgba(201,169,110,.28);border-left:none;border-right:none}
.funnel-step.convert{background:linear-gradient(135deg,rgba(201,169,110,.22),rgba(201,169,110,.08));border:1px solid rgba(201,169,110,.38);border-radius:0 20px 20px 0}
.funnel-icon{font-size:32px;margin-bottom:10px}
.funnel-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:8px}
.funnel-sub{font-size:12px;color:var(--muted);line-height:1.5}
/* PROFILE OPTI */
.profile-opti{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.opti-item{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;display:flex;gap:14px;align-items:flex-start;tra
