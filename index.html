<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>30 Days Content — Enzo Panuela × Noble Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0d16;--bg2:#151126;
  --card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);
  --text:#f7f7f7;--muted:#cbc7df;--soft:#8d87a3;
  --purple:#7468ff;--shadow:0 24px 60px rgba(0,0,0,.28);
  --green:#22c55e;
}
*{box-sizing:border-box;max-width:100%}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);overflow-x:hidden;letter-spacing:-.01em;width:100%;}
img,video,iframe,table,pre{max-width:100%}
h1,h2,h3,p{margin:0}
h1{font-size:clamp(34px,6vw,82px);line-height:.92;font-weight:900;letter-spacing:-.05em}
h2{font-size:clamp(24px,3.5vw,52px);line-height:.95;font-weight:900;letter-spacing:-.04em}
p{color:var(--muted);line-height:1.65;font-size:clamp(14px,1.3vw,17px)}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px;width:100%}
.section{padding:72px 0}
#progress-bar{position:fixed;top:0;left:0;z-index:100;height:3px;width:0%;background:linear-gradient(90deg,var(--purple),#a78bfa);transition:width .1s linear;}
nav{position:sticky;top:0;z-index:50;background:rgba(15,13,22,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 20px;width:100%;}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{flex-shrink:0;display:inline-flex;align-items:center;border:1px solid rgba(116,104,255,.32);background:rgba(116,104,255,.08);padding:7px 14px;border-radius:999px;color:#d9d6ff;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;transition:background .18s;}
.brand:hover{background:rgba(116,104,255,.2)}
.nav-links{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.nav-links a{font-size:12px;color:var(--soft);padding:6px 11px;border-radius:999px;border:1px solid transparent;font-weight:600;letter-spacing:.04em;transition:all .18s;white-space:nowrap;}
.nav-links a:hover{color:var(--text);border-color:var(--border);background:var(--card)}
.btn-pdf{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;border:1px solid rgba(116,104,255,.35);background:rgba(116,104,255,.14);color:#d9d6ff;font-size:11px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-pdf:hover{background:rgba(116,104,255,.28)}
/* LANG TOGGLE */
.lang-toggle{display:inline-flex;border-radius:999px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;}
.lang-btn{padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--soft);transition:all .18s;letter-spacing:.06em;}
.lang-btn.active{background:var(--purple);color:#fff;}
.lang-btn:hover:not(.active){background:var(--card);color:var(--text);}
.hero{padding:90px 20px 72px;background:radial-gradient(900px 500px at 90% 10%, rgba(116,104,255,.20), transparent 30%),radial-gradient(700px 380px at 8% 85%, rgba(95,88,150,.16), transparent 28%),linear-gradient(135deg,#0f0d16 0%,#120f1c 42%,#1d1931 100%);width:100%;}
.hero-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;}
.small{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);margin-bottom:12px}
.hero-sub{font-size:clamp(14px,1.5vw,19px);color:var(--muted);margin-top:16px;line-height:1.55}
.hero-cta{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.cta{padding:11px 20px;border-radius:999px;border:1px solid rgba(116,104,255,.35);background:rgba(116,104,255,.14);color:#d9d6ff;font-weight:700;font-size:14px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.cta:hover{background:rgba(116,104,255,.28)}
.cta.ghost{background:transparent;border-color:var(--border);color:var(--muted)}
.cta.ghost:hover{background:var(--card);color:var(--text)}
.handles{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.handle{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;transition:all .18s;}
.handle:hover{border-color:rgba(116,104,255,.4);background:rgba(116,104,255,.1);color:var(--text)}
.handle .platform{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft)}
.cover-box{padding:24px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border-radius:24px;box-shadow:var(--shadow);width:100%;}
.mockfeed{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.tile{aspect-ratio:1/1;border-radius:14px;padding:10px;background:linear-gradient(160deg,#050507,#1e1830 55%,#514a88);border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;transition:border-color .18s,transform .18s;text-decoration:none;}
